<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>El Promillo</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="auth-layout">
      <section class="auth-panel">
        <div class="brand-block">
          <p class="eyebrow">El Promillo</p>
          <h1>Betreiberzugang</h1>
        </div>

        <div id="authMessage" class="message" hidden></div>

        <div class="auth-grid">
          <form id="loginForm" class="panel">
            <h2>Login</h2>
            <label>E-Mail
              <input name="email" type="email" autocomplete="email" required>
            </label>
            <label>Passwort
              <input name="password" type="password" autocomplete="current-password" required>
            </label>
            <button class="primary" type="submit">Einloggen</button>
          </form>

          <form id="registerForm" class="panel">
            <h2>Registrieren</h2>
            <label>Name
              <input name="display_name" autocomplete="name">
            </label>
            <label>E-Mail
              <input name="email" type="email" autocomplete="email" required>
            </label>
            <label>Passwort
              <input name="password" type="password" autocomplete="new-password" minlength="6" required>
            </label>
            <button class="secondary" type="submit">Account erstellen</button>
          </form>
        </div>
      </section>
    </main>

    <script>
      if (window.location.protocol === 'file:') {
        const message = document.getElementById('authMessage');
        if (message) {
          message.hidden = false;
          message.className = 'message error';
          message.textContent = 'Bitte diese Datei nicht direkt öffnen. Starte den lokalen Server und öffne http://localhost:3000.';
        }
      }
    </script>
    <script type="module" src="/js/auth.js"></script>
  </body>
</html>
