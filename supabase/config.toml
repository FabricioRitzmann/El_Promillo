project_id = "el-promillo"

# Public/external functions must disable Supabase's platform JWT gate so the
# function code can validate its own token shape: ApplePass, browser claim key,
# payment webhook secret or WALLET_CRON_SECRET. Operator-only functions keep the
# default verify_jwt=true.

[functions.claim-card]
verify_jwt = false

[functions.get-public-template]
verify_jwt = false

[functions.claim-apple-pass]
verify_jwt = false

[functions.google-wallet-save-link]
verify_jwt = false

[functions.samsung-wallet-add-link]
verify_jwt = false

[functions.samsung-wallet-server]
verify_jwt = false

[functions.create-topup-payment-session]
verify_jwt = false

[functions.confirm-topup-payment]
verify_jwt = false

[functions.apple-wallet-webservice]
verify_jwt = false

[functions.process-scheduled-wallet-notifications]
verify_jwt = false

[functions.process-wallet-update-queue]
verify_jwt = false
